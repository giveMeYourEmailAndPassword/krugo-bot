services:
  skills-init:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p $$HERMES_HOME/skills && cp -ru /opt/skills/contracts/. $$HERMES_HOME/skills/contracts/ && chmod +x $$HERMES_HOME/skills/contracts/tools/*.sh && echo 'skills synced'"]
    environment:
      - HERMES_HOME=/opt/data
    volumes:
      - hermes-data:/opt/data
    restart: "no"

  hermes:
    image: nousresearch/hermes-agent:latest
    command: ["sleep", "infinity"]
    depends_on:
      skills-init:
        condition: service_completed_successfully
    environment:
      - HERMES_HOME=/opt/data
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - PB_URL=${PB_URL:?required}
      - PB_USER=${PB_USER:?required}
      - PB_PASS=${PB_PASS:?required}
      - BACKEND_URL=${BACKEND_URL:-}
    volumes:
      - hermes-data:/opt/data
    restart: unless-stopped

  hermes-proxy:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    depends_on:
      skills-init:
        condition: service_completed_successfully
    environment:
      - HERMES_HOME=/opt/data
      - HERMES_BRIDGE_KEY=${HERMES_BRIDGE_KEY}
      - PB_URL=${PB_URL:?required}
      - PB_USER=${PB_USER:?required}
      - PB_PASS=${PB_PASS:?required}
      - HERMES_TIMEOUT=${HERMES_TIMEOUT:-3m}
    volumes:
      - hermes-data:/opt/data
    restart: unless-stopped
    network_mode: host
volumes:
  hermes-data:

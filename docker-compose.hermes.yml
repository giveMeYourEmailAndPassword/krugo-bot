services:
  hermes:
    image: nousresearch/hermes-agent:latest
    command: ["sleep", "infinity"]
    environment:
      - HERMES_HOME=/opt/data
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - PB_URL=${PB_URL:?required}
      - PB_USER=${PB_USER:?required}
      - PB_PASS=${PB_PASS:?required}
      - BACKEND_URL=${BACKEND_URL:-}
    volumes:
      - hermes-data:/opt/data
      - ./hermes/skills/contracts:/opt/data/skills/contracts:ro
    restart: unless-stopped

  hermes-proxy:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    environment:
      - HERMES_HOME=/opt/data
      - HERMES_BRIDGE_KEY=${HERMES_BRIDGE_KEY}
      - PB_URL=${PB_URL:?required}
      - PB_USER=${PB_USER:?required}
      - PB_PASS=${PB_PASS:?required}
    volumes:
      - hermes-data:/opt/data
      - ./hermes/skills/contracts:/opt/data/skills/contracts:ro
    restart: unless-stopped
    network_mode: host
volumes:
  hermes-data:

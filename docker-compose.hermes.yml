services:
  hermes:
    image: nousresearch/hermes-agent:latest
    environment:
      - HERMES_HOME=/opt/data
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}

volumes:
  hermes-data:

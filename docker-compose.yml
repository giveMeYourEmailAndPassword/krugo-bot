services:
  # Hermes Agent — s6-overlay управляет сервисами.
  # Первый запуск: docker compose run --rm hermes setup
  # Gateway: docker compose run --rm hermes gateway setup
  # Профиль gateway сохраняется в /opt/data, поднимается при рестарте.
  hermes:
    image: nousresearch/hermes-agent:latest
    environment:
      - HERMES_HOME=/opt/data
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
    volumes:
      - hermes-data:/opt/data
    restart: unless-stopped

  # krugo-bot — standalone Go-бот, DeepSeek напрямую
  krugo-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_PATH=/app/data/hermes.db
      - BOT_ENV=${BOT_ENV:-production}
    volumes:
      - bot-data:/app/data
    restart: unless-stopped

volumes:
  hermes-data:
  bot-data:

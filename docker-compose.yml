services:
  # Hermes Agent — запускается, но gateway требует ручной настройки:
  #   docker compose exec hermes hermes gateway setup
  #   docker compose exec hermes hermes gateway start
  hermes:
    image: nousresearch/hermes-agent:latest
    environment:
      - HERMES_HOME=/opt/data
    volumes:
      - hermes-data:/opt/data
    restart: unless-stopped
    profiles:
      - hermes

  # krugo-bot — standalone Go-бот, DeepSeek напрямую
  krugo-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_PATH=/app/data/hermes.db
      - BOT_ENV=${BOT_ENV:-production}
    volumes:
      - bot-data:/app/data
    restart: unless-stopped

volumes:
  hermes-data:
  bot-data:
